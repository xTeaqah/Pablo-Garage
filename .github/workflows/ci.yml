name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pablo_garage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pablo_garage_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pablo_garage_test
      AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      ADMIN_USERNAME: Pablo
      ADMIN_PASSWORD: ci-test-password-12345

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm test

      - run: npm run lint

      - run: npm run build
