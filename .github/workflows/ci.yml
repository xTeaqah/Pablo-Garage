name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pablo_garage_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mysql://root:root@localhost:3306/pablo_garage_test
      AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      ADMIN_USERNAME: Pablo
      ADMIN_PASSWORD: ci-test-password-12345

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm test

      - run: npm run lint

      - run: npm run build
